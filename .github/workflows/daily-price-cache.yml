# 매일 주가 지표 캐시 갱신 → data/price_cache.csv 커밋
# Streamlit Cloud는 main push를 받아 자동 재배포됩니다.
#
# 참고: GitHub 호스트 러너는 해외 IP라 네이버가 막힐 수 있습니다.
# price.py 가 Yahoo/FDR 로 폴백하므로 대부분 동작합니다.
# 품질이 부족하면 로컬(한국)에서 scripts/build_price_cache.py 를 돌리세요.

name: daily-price-cache

on:
  schedule:
    # 평일 06:10 KST ≈ 21:10 UTC (전일)
    - cron: "10 21 * * 0-4"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-price-cache:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build price cache
        run: python scripts/build_price_cache.py --workers 10 --timeout 12

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/price_cache.csv data/price_cache_meta.txt
          if git diff --staged --quiet; then
            echo "No price cache changes"
            exit 0
          fi
          git commit -m "chore: refresh daily price cache"
          git push
